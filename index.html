<!doctype html>
<html lang="zh-CN" data-theme="silk">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>xiake.shop · 虾壳 2.0 小主机</title>
        <meta
            name="description"
            content="xiake.shop 虾壳 2.0 小主机，预装 Windows 与最新版 openclawbot，支持微信控制。售价 799，原价 1299。"
        />
        <link rel="icon" href="favicon.svg" type="image/svg+xml" />
        <meta name="theme-color" content="#f3b7c8" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Manrope:wght@400;500;600&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body class="min-h-screen bg-base-200 font-sans text-base-content">
        <main class="relative mx-auto w-full max-w-3xl px-4 py-12 lg:py-16">
            <div
                class="pointer-events-none absolute inset-x-0 -top-24 h-64 bg-gradient-to-r from-primary/35 via-secondary/20 to-accent/25 blur-3xl"
            ></div>

            <div class="relative space-y-8">
                <div class="flex items-center gap-3 text-xs font-semibold uppercase tracking-[0.3em] text-base-content/60">
                    <img
                        class="h-10 w-10 rounded-2xl bg-base-100 p-2 shadow"
                        src="favicon.svg"
                        alt="xiake.shop logo"
                    />
                    <span>xiake.shop｜虾壳商店</span>
                </div>

                <div class="space-y-3">
                    <h1 class="font-display text-4xl font-semibold leading-tight sm:text-5xl">虾壳 2.0 小主机</h1>
                    <p class="text-base text-base-content/70">预装 Windows + openclaw，微信控制，开箱即用。</p>
                </div>

                <div class="flex flex-wrap items-end gap-3">
                    <span class="font-display text-5xl text-primary">¥799</span>
                    <span class="badge badge-outline">原价 ¥1299</span>
                    <span class="badge badge-secondary">立省 ¥500</span>
                </div>

                <div class="card border border-base-300/60 bg-base-100 shadow-md">
                    <figure class="px-6 pt-6">
                        <img
                            src="product22.png"
                            alt="openclaw 小主机 产品图"
                            class="w-full rounded-2xl shadow"
                        />
                    </figure>
                    <div class="card-body">
                        <p class="text-sm text-base-content/70">体积小、稳定静音，适合桌面或柜内长期运行。</p>
                    </div>
                </div>

                <div class="card border border-base-300/60 bg-base-100 shadow-md">
                    <figure class="px-6 pt-6">
                        <img src="size.png" alt="虾壳 2.0 尺寸示意" class="w-full rounded-2xl shadow" />
                    </figure>
                    <div class="card-body">
                        <p class="text-sm text-base-content/70">尺寸示意图。</p>
                    </div>
                </div>

                <div class="card border border-base-300/60 bg-base-100 shadow-md">
                    <div class="card-body gap-4">
                        <h2 class="font-display text-lg">标准版配置</h2>
                        <ul class="space-y-2 text-sm text-base-content/70">
                            <li class="flex justify-between"><span>处理器</span><span class="font-medium text-base-content">i3 4130 双核</span></li>
                            <li class="flex justify-between"><span>内存</span><span class="font-medium text-base-content">8G</span></li>
                            <li class="flex justify-between"><span>存储</span><span class="font-medium text-base-content">128G M.2 固态</span></li>
                            <li class="flex justify-between"><span>系统</span><span class="font-medium text-base-content">Windows + openclaw</span></li>
                            <li class="flex justify-between"><span>控制</span><span class="font-medium text-base-content">微信控制</span></li>
                            <li class="flex justify-between"><span>配件</span><span class="font-medium text-base-content">电源 + WiFi</span></li>
                        </ul>
                    </div>
                </div>

                <section class="card border border-base-300/60 bg-base-100 shadow-md" id="order">
                    <div class="card-body gap-4">
                        <div class="space-y-1">
                            <h2 class="font-display text-lg">支付并填写收货信息</h2>
                            <p class="text-sm text-base-content/70">支付页填写称呼、手机与地址。</p>
                        </div>

                        <div
                            class="pay-panel rounded-2xl border border-base-300/60 bg-base-200/70 p-4"
                            data-onepay-base="https://onepay.minapp.xin"
                            data-redirect-url=""
                            data-notify-url=""
                        >
                            <button class="btn btn-primary btn-wide" type="button" id="pay-button">
                                下单并去支付
                            </button>
                            <div class="min-h-[1.25rem] text-xs text-base-content/60" id="order-status" role="status"></div>
                        </div>

                        <div class="flex items-center justify-between gap-3 border-t border-base-200/80 pt-4">
                            <span class="badge badge-outline">购买客服</span>
                            <span class="text-sm font-semibold tracking-wide">tianshe00</span>
                        </div>
                    </div>
                </section>
            </div>
        </main>

        <script>
            const statusEl = document.getElementById("order-status");
            const payBtn = document.getElementById("pay-button");
            const payPanel = document.querySelector(".pay-panel");

            const priceFen = 79900;
            const productTitle = "虾壳 2.0 小主机";
            const baseUrl = (payPanel.dataset.onepayBase || "").replace(/\/$/, "");
            const fallbackRedirectUrl = `${window.location.origin}${window.location.pathname}?paid=1`;
            const redirectUrl = payPanel.dataset.redirectUrl || fallbackRedirectUrl;
            const notifyUrl = payPanel.dataset.notifyUrl || "";

            const setStatus = (text) => {
                statusEl.textContent = text;
            };

            const setButtonState = (loading) => {
                payBtn.disabled = loading;
                payBtn.textContent = loading ? "正在创建订单..." : "下单并去支付";
            };

            const createOutTradeNo = () => `XK${Date.now()}${Math.floor(100 + Math.random() * 900)}`;

            payBtn.addEventListener("click", async () => {
                if (!baseUrl) {
                    setStatus("请先配置支付服务地址。");
                    return;
                }

                setButtonState(true);
                setStatus("正在创建订单...");

                try {
                    const params = new URLSearchParams({
                        fee: String(priceFen),
                        redirectUrl,
                        title: productTitle,
                        fields: "ship",
                        outTradeNo: createOutTradeNo(),
                    });
                    if (notifyUrl) {
                        params.set("notifyUrl", notifyUrl);
                    }
                    const targetUrl = `${baseUrl}/api/create-order?${params.toString()}`;
                    setStatus("正在跳转支付页...");
                    window.location.href = targetUrl;
                } catch (error) {
                    setStatus("下单失败，请稍后重试或联系微信客服。");
                    setButtonState(false);
                }
            });

            if (new URLSearchParams(window.location.search).get("paid") === "1") {
                setStatus("已完成支付，请联系微信客服确认发货。");
            }
        </script>
    </body>
</html>
