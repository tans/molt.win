<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>xiake.shop · 虾壳小主机</title>
        <meta
            name="description"
            content="虾壳小主机，i5 16G 256G，预装 Codex、openclaw、cc-switch 等软件，开箱即用。"
        />
        <link rel="icon" href="favicon.svg" type="image/svg+xml" />
        <meta name="theme-color" content="#050505" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Manrope:wght@400;500;600&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                color-scheme: dark;
                --bg: #050505;
                --panel: #0d0d0d;
                --line: #242424;
                --text: #f5f5f0;
                --muted: #a3a39a;
                --soft: #696961;
                --accent: #f5f5f0;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                background: var(--bg);
                color: var(--text);
                font-family: Manrope, "Helvetica Neue", Arial, sans-serif;
            }

            main {
                width: min(100%, 760px);
                margin: 0 auto;
                padding: 56px 20px;
            }

            .brand {
                display: flex;
                align-items: center;
                gap: 12px;
                color: var(--soft);
                font-size: 12px;
                font-weight: 700;
                letter-spacing: 0.24em;
                text-transform: uppercase;
            }

            .brand img {
                width: 34px;
                height: 34px;
                padding: 7px;
                border: 1px solid var(--line);
                border-radius: 8px;
                background: #111;
            }

            .stack {
                display: grid;
                gap: 20px;
            }

            .hero {
                padding-top: 44px;
            }

            h1,
            h2,
            p {
                margin: 0;
            }

            h1,
            h2,
            .price {
                font-family: Sora, Manrope, sans-serif;
                letter-spacing: 0;
            }

            h1 {
                max-width: 680px;
                font-size: clamp(42px, 8vw, 76px);
                line-height: 0.95;
                font-weight: 700;
            }

            .lead {
                max-width: 620px;
                margin-top: 24px;
                color: var(--muted);
                font-size: 18px;
                line-height: 1.7;
            }

            .price-row {
                display: flex;
                flex-wrap: wrap;
                align-items: end;
                gap: 14px;
                margin-top: 28px;
            }

            .price {
                font-size: 52px;
                line-height: 1;
                font-weight: 700;
            }

            .tag {
                border: 1px solid var(--line);
                border-radius: 999px;
                padding: 7px 12px;
                color: var(--muted);
                font-size: 13px;
            }

            .panel {
                border: 1px solid var(--line);
                border-radius: 8px;
                background: var(--panel);
                padding: 22px;
            }

            .panel h2 {
                margin-bottom: 14px;
                font-size: 18px;
                font-weight: 600;
            }

            .panel p,
            .panel li,
            .spec span:first-child {
                color: var(--muted);
            }

            .product {
                width: 100%;
                border: 1px solid var(--line);
                border-radius: 8px;
                display: block;
            }

            .specs,
            .software {
                list-style: none;
                margin: 0;
                padding: 0;
            }

            .spec {
                display: flex;
                justify-content: space-between;
                gap: 24px;
                border-top: 1px solid var(--line);
                padding: 12px 0;
                font-size: 15px;
            }

            .spec:first-child {
                border-top: 0;
                padding-top: 0;
            }

            .spec:last-child {
                padding-bottom: 0;
            }

            .software {
                display: grid;
                gap: 10px;
            }

            .software li {
                border-top: 1px solid var(--line);
                padding-top: 10px;
            }

            .software li:first-child {
                border-top: 0;
                padding-top: 0;
            }

            .pay-panel {
                display: grid;
                gap: 12px;
            }

            .pay-note,
            #order-status {
                color: var(--muted);
                font-size: 14px;
                line-height: 1.6;
            }

            #pay-button {
                width: 100%;
                min-height: 54px;
                border: 0;
                border-radius: 8px;
                background: var(--accent);
                color: #050505;
                cursor: pointer;
                font: 700 16px/1 Manrope, sans-serif;
            }

            #pay-button:disabled {
                cursor: wait;
                opacity: 0.68;
            }

            .wechat {
                color: var(--text);
                font-weight: 700;
            }

            @media (max-width: 560px) {
                main {
                    padding: 36px 16px;
                }

                .hero {
                    padding-top: 34px;
                }

                .lead {
                    font-size: 16px;
                }

                .price {
                    font-size: 44px;
                }

                .panel {
                    padding: 18px;
                }
            }
        </style>
    </head>
    <body>
        <main class="stack">
            <div class="brand">
                <img src="favicon.svg" alt="xiake.shop logo" />
                <span>xiake.shop</span>
            </div>

            <section class="hero">
                <h1>虾壳小主机</h1>
                <p class="lead">
                    i5 16G 256G。预装 Codex、openclaw、cc-switch
                    等软件，开箱即用，无需翻墙注册。
                </p>
                <div class="price-row">
                    <span class="price" id="sale-price">¥1399</span>
                    <span class="tag">现货单规格</span>
                </div>
            </section>

            <section class="panel" id="order">
                <h2>直接下单</h2>
                <p class="pay-note" id="pay-fee-tip">当前支付金额：¥1399</p>
                <div
                    class="pay-panel"
                    data-onepay-base="https://pay.jisuhudong.com"
                    data-base-price-fen="139900"
                    data-product-title="虾壳小主机"
                    data-order-prefix="XK"
                    data-redirect-url=""
                    data-notify-url=""
                >
                    <button type="button" id="pay-button">下单并去支付</button>
                    <div id="order-status" role="status"></div>
                </div>
            </section>

            <img class="product" src="product22.png" alt="虾壳小主机产品图" />

            <section class="panel">
                <h2>配置</h2>
                <ul class="specs">
                    <li class="spec"><span>处理器</span><strong>i5</strong></li>
                    <li class="spec"><span>内存</span><strong>16G</strong></li>
                    <li class="spec">
                        <span>存储</span><strong>256G M.2 固态</strong>
                    </li>
                    <li class="spec">
                        <span>客服微信</span
                        ><strong data-service-wechat>tianshe00</strong>
                    </li>
                </ul>
            </section>

            <section class="panel">
                <h2>预装软件</h2>
                <ul class="software">
                    <li>Codex</li>
                    <li>openclaw</li>
                    <li>cc-switch</li>
                    <li>常用运行环境与辅助工具</li>
                </ul>
            </section>

            <section class="panel">
                <h2>客服福利</h2>
                <p>
                    加客服微信
                    <span class="wechat" data-service-wechat>tianshe00</span>
                    领 100 美金最新顶级大模型额度，送完即止。
                </p>
            </section>
        </main>

        <script src="pay.js"></script>
    </body>
</html>
