<!doctype html>
<html lang="zh-CN" data-theme="silk">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>xiake.shop · 商品列表</title>
        <meta
            name="description"
            content="xiake.shop 虾壳商店商品列表，包含普通版与高配版，预装 openclaw，支持微信控制。"
        />
        <link rel="icon" href="favicon.svg" type="image/svg+xml" />
        <meta name="theme-color" content="#f3b7c8" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Manrope:wght@400;500;600&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body class="min-h-screen bg-base-200 font-sans text-base-content">
        <main class="relative mx-auto w-full max-w-4xl px-4 py-12 lg:py-16">
            <div
                class="pointer-events-none absolute inset-x-0 -top-24 h-64 bg-gradient-to-r from-primary/35 via-secondary/20 to-accent/25 blur-3xl"
            ></div>

            <div class="relative space-y-8">
                <div
                    class="flex items-center gap-3 text-xs font-semibold uppercase tracking-[0.3em] text-base-content/60"
                >
                    <img
                        class="h-10 w-10 rounded-2xl bg-base-100 p-2 shadow"
                        src="favicon.svg"
                        alt="xiake.shop logo"
                    />
                    <span>xiake.shop｜虾壳商店</span>
                </div>

                <div class="space-y-3">
                    <h1
                        class="font-display text-4xl font-semibold leading-tight sm:text-5xl"
                    >
                        虾壳 2.0 小主机
                    </h1>
                    <p class="text-base text-base-content/70">
                        请选择版本下单：普通版或高配版。
                    </p>
                </div>

                <section class="space-y-4">
                    <h2 class="font-display text-2xl">选择配置</h2>
                    <div
                        class="card border border-base-300/60 bg-base-100 shadow-md"
                    >
                        <figure class="px-6 pt-6">
                            <img
                                src="openclaw-logo-text.png"
                                alt="openclaw logo"
                                class="h-48 w-full rounded-2xl bg-base-200 p-4 object-contain shadow"
                            />
                        </figure>
                        <div class="grid gap-4 mt-4 px-6 md:grid-cols-2">
                            <img
                                src="size.png"
                                alt="虾壳 2.0 尺寸示意"
                                class="w-full rounded-2xl shadow"
                            />
                            <img
                                src="product22.png"
                                alt="虾壳 2.0 产品图"
                                class="w-full rounded-2xl shadow"
                            />
                        </div>
                        <div class="card-body gap-4">
                            <div
                                class="flex items-center justify-between gap-3 border-b border-base-200/80 pb-4"
                            >
                                <div>
                                    <h3 class="font-display text-lg">普通版</h3>
                                    <p class="text-sm text-base-content/70">
                                        i3 4130 / 8G / 128G M.2 固态
                                    </p>
                                </div>
                                <div class="flex items-center gap-3">
                                    <span
                                        class="font-display text-2xl text-primary"
                                        >¥799</span
                                    >
                                    <a
                                        class="btn btn-primary btn-sm sku-link"
                                        href="normal.html"
                                        >选择</a
                                    >
                                </div>
                            </div>

                            <div
                                class="flex items-center justify-between gap-3"
                            >
                                <div>
                                    <h3 class="font-display text-lg">高配版</h3>
                                    <p class="text-sm text-base-content/70">
                                        i5 / 16G / 256G M.2 固态
                                    </p>
                                </div>
                                <div class="flex items-center gap-3">
                                    <span
                                        class="font-display text-2xl text-primary"
                                        >¥1499</span
                                    >
                                    <a
                                        class="btn btn-primary btn-sm sku-link"
                                        href="pro.html"
                                        >选择</a
                                    >
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="space-y-4">
                    <h2 class="font-display text-2xl">产品特色</h2>

                    <div
                        class="card border border-base-300/60 bg-base-100 shadow-md"
                    >
                        <div class="card-body gap-4">
                            <div
                                class="flex items-center justify-between gap-3"
                            >
                                <h3 class="font-display text-lg">
                                    预装 clawos - openclaw 管理升级软件
                                </h3>
                                <a
                                    class="btn btn-primary btn-sm"
                                    href="https://clawos.cc"
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    >访问 clawos.cc</a
                                >
                            </div>
                            <figure>
                                <img
                                    src="clawos.png"
                                    alt="clawos 功能插图"
                                    class="w-full rounded-2xl shadow"
                                />
                            </figure>
                            <ul
                                class="list-disc space-y-2 pl-5 text-sm text-base-content/70"
                            >
                                <li>一键升级 openclaw</li>
                                <li>模型配置更简单</li>
                                <li>内置技能市场</li>
                                <li>
                                    内置钱包，方便机器人购买互联网上的各种服务
                                </li>
                            </ul>
                        </div>
                    </div>
                </section>

                <div class="flex justify-center gap-2 pt-2">
                    <a class="btn btn-ghost btn-sm" href="doc.html">使用文档</a>
                    <a class="btn btn-ghost btn-sm" href="ref.html">推荐后台</a>
                </div>
            </div>
        </main>

        <script>
            (() => {
                const refStorageKey = "xiake_ref_code";
                const sanitizeRefCode = (raw) => {
                    if (!raw) {
                        return null;
                    }
                    const code = String(raw)
                        .trim()
                        .toUpperCase()
                        .replace(/[^A-Z0-9]/g, "");
                    return code.length >= 2 && code.length <= 24 ? code : null;
                };

                const searchParams = new URLSearchParams(
                    window.location.search,
                );
                const fromUrl = sanitizeRefCode(searchParams.get("ref"));
                const fromStorage = sanitizeRefCode(
                    localStorage.getItem(refStorageKey),
                );
                const refCode = fromUrl || fromStorage;

                if (fromUrl) {
                    localStorage.setItem(refStorageKey, fromUrl);
                }

                if (!refCode) {
                    return;
                }

                document.querySelectorAll("a.sku-link").forEach((link) => {
                    const url = new URL(
                        link.getAttribute("href"),
                        window.location.origin,
                    );
                    url.searchParams.set("ref", refCode);
                    link.setAttribute("href", `${url.pathname}${url.search}`);
                });
            })();
        </script>
    </body>
</html>
